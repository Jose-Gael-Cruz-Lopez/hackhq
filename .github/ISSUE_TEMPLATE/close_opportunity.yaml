name: Close Hackathon
description: Request to close/archive a hackathon listing
title: "Close Hackathon"
labels: ["close_opportunity"]
body:
  - type: markdown
    attributes:
      value: |
        ## Close Hackathon Request
        Use this form to request closing a hackathon listing that is no longer available.

  - type: input
    id: company_name
    attributes:
      label: Host/Organizer Name
      description: Name of the host or organizer
      placeholder: ex. MIT
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Hackathon Name
      description: Name of the hackathon
      placeholder: ex. HackMIT 2026
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Hackathon URL (Optional)
      description: |
        Link to the hackathon page (optional, helps identify if there are
        multiple similar events)
      placeholder: ex. https://hackmit.org/
    validations:
      required: false

  - type: dropdown
    id: reason
    attributes:
      label: Reason for closing
      description: Why should this listing be closed?
      multiple: false
      options:
        - Registration deadline passed
        - Event has ended
        - Event cancelled
        - Duplicate listing
        - Other
    validations:
      required: true

  - type: textarea
    id: additional_info
    attributes:
      label: Additional Information (Optional)
      description: Any additional context about why this listing should be closed
      placeholder: The event took place last weekend...
    validations:
      required: false
